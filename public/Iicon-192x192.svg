<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Red Circle Brush -->
  <circle cx="260" cy="220" r="90"
          fill="none"
          stroke="#d62828"
          stroke-width="20"
          stroke-linecap="round"
          stroke-dasharray="500 120"/>

  <!-- Gradient -->
  <defs>
    <linearGradient id="animeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
  </defs>

  <!-- ANIME Text -->
  <text x="70" y="250"
        font-size="90"
        font-family="Arial Black"
        font-weight="bold"
        fill="url(#animeGrad)"
        stroke="black"
        stroke-width="8">
    𝗔𝚗𝚒𝚖𝚎
  </text>

  <!-- MULTIFLIX Text -->
  <text x="120" y="320"
        font-size="48"
        font-family="Arial Black"
        font-style="italic"
        font-weight="bold"
        fill="white"
        stroke="black"
        stroke-width="6">
    𝙼ᴜʟᴛɪ𝙵ʟɪx
  </text>

</svg>
